<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <rect width="100" height="100" rx="22" fill="#007AFF"/>
  <!-- Crown -->
  <rect x="38" y="10" width="24" height="9" rx="4.5" fill="white"/>
  <!-- Buttons top -->
  <rect x="24" y="16" width="10" height="6" rx="3" fill="rgba(255,255,255,0.7)"/>
  <rect x="66" y="16" width="10" height="6" rx="3" fill="rgba(255,255,255,0.7)"/>
  <!-- Dial -->
  <circle cx="50" cy="58" r="30" fill="white" opacity="0.15"/>
  <circle cx="50" cy="58" r="27" fill="none" stroke="white" stroke-width="5"/>
  <!-- Minute marks -->
  <line x1="50" y1="33" x2="50" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="78" x2="50" y2="83" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="25" y1="58" x2="30" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="58" x2="75" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="50" y1="58" x2="50" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="50" y1="58" x2="62" y2="50" stroke="rgba(255,200,0,1)" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="58" r="3.5" fill="white"/>
</svg>